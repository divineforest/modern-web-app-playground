name: CI

on:
  pull_request:

jobs:
  static-checks:
    name: Static checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format
        run: pnpm run format:check

      - name: Lint
        run: |
          pnpm run lint:biome
          pnpm run lint:eslint

      - name: Type check
        run: pnpm run typecheck

      - name: Type coverage
        run: pnpm run type-coverage

      - name: Build
        run: pnpm run build

      - name: Security audit
        run: pnpm audit --audit-level moderate

      - name: Spell check
        run: pnpm run spell

      - name: Dead code detection
        run: pnpm run knip

  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    # Skip for Dependabot PRs (only updates dependencies, no secrets risk)
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  tests:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: accounting_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup database extensions
        run: |
          # Install PostgreSQL client
          sudo apt-get update
          sudo apt-get install -y postgresql-client

          # Create required PostgreSQL extensions
          PGPASSWORD=password psql -h localhost -U user -d accounting_test << 'EOF'
          CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
          CREATE EXTENSION IF NOT EXISTS "pg_trgm";
          EOF

      - name: Run database migrations
        run: pnpm db:migrate
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/accounting_test

      - name: Tests
        run: pnpm run test:coverage
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://user:password@localhost:5432/accounting_test
